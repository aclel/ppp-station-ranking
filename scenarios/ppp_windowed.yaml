# This scenario produces a score for each station for each day in the timeseries
name: ppp_windowed
output_dir: ../results/ppp_windowed
start_date: "2019-01-01"
end_date: "2025-12-31"
window_days: 1  # Station scores are produced every day
cache_dir: cache/query
peer_relative: True
stations_file: data/stations.txt
                                                                                                                                                                                                               
weights:
  phase_wrms: 0.225
  code_wrms: 0.10
  satellite_gaps: 0.075
  uptime: 0.075
  amb_resets: 0.175
  h_conv: 0.1
  v_conv: 0.1
  cn0: 0.05
  mp1: 0.0167
  mp2: 0.0167
  mp5: 0.0167
  mw12: 0.0167
  mw15: 0.0167
  mw25: 0.0167

  
variants:
    - {name: additive, aggregator: weighted_sum}
    - {name: topsis,   aggregator: topsis}
